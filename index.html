<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orange Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="calc">
  <div class="display">
    <div class="expr" id="expr"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="buttons">
    <button class="fn" data-action="clear">AC</button>
    <button class="fn" data-action="sign">+/&minus;</button>
    <button class="fn" data-action="percent">%</button>
    <button class="op" data-action="op" data-val="/">&divide;</button>
    <button class="num" data-val="7">7</button>
    <button class="num" data-val="8">8</button>
    <button class="num" data-val="9">9</button>
    <button class="op" data-action="op" data-val="*">&times;</button>
    <button class="num" data-val="4">4</button>
    <button class="num" data-val="5">5</button>
    <button class="num" data-val="6">6</button>
    <button class="op" data-action="op" data-val="-">&minus;</button>
    <button class="num" data-val="1">1</button>
    <button class="num" data-val="2">2</button>
    <button class="num" data-val="3">3</button>
    <button class="op" data-action="op" data-val="+">+</button>
    <button class="num zero" data-val="0">0</button>
    <button class="num" data-val=".">.</button>
    <button class="eq" data-action="eq">=</button>
  </div>
</div>
<script src="calculator.js"></script>
</body>
</html>
